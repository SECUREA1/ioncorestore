<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">IONCORE logo</title>
  <desc id="desc">Neon green IONCORE energy core emblem with lightning bolt.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#a8ff2a" stop-opacity=".95"/>
      <stop offset=".48" stop-color="#7ed321" stop-opacity=".32"/>
      <stop offset="1" stop-color="#050705" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="95" y1="62" x2="417" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7ff66"/>
      <stop offset=".45" stop-color="#7ed321"/>
      <stop offset="1" stop-color="#315414"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7ed321" flood-opacity=".7"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#050705"/>
  <circle cx="256" cy="256" r="210" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="30" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="122" fill="#0b100c" stroke="#315414" stroke-width="10"/>
  <path d="M286 62 151 282h87l-32 168 156-238h-91l15-150Z" fill="#a8ff2a" stroke="#e8ffad" stroke-width="10" stroke-linejoin="round" filter="url(#shadow)"/>
  <path d="M139 393c33 31 74 47 117 47s84-16 117-47" fill="none" stroke="#7ed321" stroke-width="18" stroke-linecap="round" opacity=".8"/>
</svg>
